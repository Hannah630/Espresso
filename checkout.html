<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購物車結帳</title>
  <link rel="stylesheet" href="css/all.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-3" style="background-color:#3C686E;">
        <a class="navbar-brand" href="/index.html">
          <img src="your-logo.png" alt="logo" width="40" height="40">佑奕設計
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
      
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">首頁</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="index.html">產品說明</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="index.html">聯絡我們</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="checkout.html">購物車</a>
            </li>
          </ul>
        </div>
      </nav>
  <div class="container py-5">
    <h2 class="mb-4">🛒 購物車結帳</h2>

    <!-- 購物車內容 -->
    <div id="cart-items" class="mb-4"></div>
    <div class="text-end mb-4">
      <h4>總金額：NT$ <span id="cart-total">0</span></h4>
    </div>

    <!-- 收件人表單 -->
    <h4 class="mb-3">📦 收件人資料</h4>
    <form id="checkout-form">
      <div class="mb-3">
        <label for="name" class="form-label">姓名</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="address" class="form-label">地址</label>
        <input type="text" class="form-control" id="address" required>
      </div>
      <button type="submit" class="btn btn-success">✅ 送出訂單</button>
    </form>
  </div>

  <footer>
    <!-- 上方白底 Footer -->
    <div class="footer-top" id="contact">
      <div class="container">
        <div class="row align-items-center">
          <!-- Logo 區 -->
          <div class="col-md-6 footer-logo text-center text-md-start mb-3 mb-md-0">
            <img src="your-logo.png" alt="佑奕設計社 Logo">
          </div>
          <!-- 聯絡資訊 -->
          <div class="footer-contact text-center text-md-end text-dark">
            <p><i class="bi bi-person-fill me-2"></i>姓名：林奕全</p>
            <p><i class="bi bi-telephone-fill me-2"></i>電話：<span style="font-weight: 500;">0968-365-510</span></p>
            <p><i class="bi bi-chat-dots-fill me-2"></i>LINE ID：<span style="font-weight: 500;">limdesign047@gmail.com</span></p>
            <p><i class="bi bi-geo-alt-fill me-2"></i>地址：彰化縣埔心鄉東門村新興路44巷15號</p>
          </div>
          
        </div>
      </div>
    </div>
  
    <!-- 底部版權 -->
    <div class="footer-bottom">
      ©Copyright 2025 by 佑奕設計社 All Rights Reserved.｜Design by 佑奕設計
    </div>
  </footer>

  <script>
    emailjs.init("YOUR_PUBLIC_KEY"); // 替換為你的 EmailJS Public Key

    let currentItem = {
      name: '研磨壓萃咖啡組',
      price: 9800,
      img: 'pic/product1.png',
      desc: '內容物：磨豆機+壓萃機+清潔刷'
    };

    document.querySelectorAll('.change-item').forEach(el => {
      el.addEventListener('click', () => {
        currentItem.name = el.dataset.name;
        currentItem.price = parseInt(el.dataset.price);
        currentItem.img = el.dataset.img;
        currentItem.desc = el.dataset.desc || '';

        document.getElementById('product-img').src = currentItem.img;
        document.getElementById('product-name').textContent = currentItem.name;
        document.getElementById('product-price').textContent = currentItem.price;
        document.getElementById('product-desc').textContent = currentItem.desc;
      });
    });

    document.getElementById('add-to-cart').addEventListener('click', () => {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const existing = cart.find(item => item.name === currentItem.name);
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ ...currentItem, qty: 1 });
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(`${currentItem.name} 已加入購物車`);
      loadCart();
    });

    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cart-items');
      const total = document.getElementById('cart-total');
      container.innerHTML = '';
      let sum = 0;

      if (cart.length === 0) {
        container.innerHTML = '<p class="text-muted">購物車是空的。</p>';
        total.textContent = '0';
        return;
      }

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.qty;
        sum += itemTotal;
        container.innerHTML += `
          <div class="card mb-2">
            <div class="card-body">
              <h5>${item.name}</h5>
              <p class="mb-1 text-muted">${item.desc || ''}</p>
              <p>單價 NT$${item.price} x ${item.qty} = NT$${itemTotal}</p>
              <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">移除</button>
            </div>
          </div>`;
      });
      total.textContent = sum;
    }

    function removeItem(index) {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    document.getElementById('checkout-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      if (cart.length === 0) return alert('購物車是空的');

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const address = document.getElementById('address').value;
      const total = document.getElementById('cart-total').textContent;
      const items = cart.map(item => `${item.name} x${item.qty}`).join('\n');

      emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
        name, email, address, total, items
      }).then(() => {
        alert('✅ 訂單已送出！');
        localStorage.removeItem('cart');
        document.getElementById('checkout-form').reset();
        loadCart();
      }, err => alert('❌ 發送失敗：' + JSON.stringify(err)));
    });

    loadCart();
  </script>
</body>
</html>
