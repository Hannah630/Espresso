<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購物車結帳</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-3" style="background-color:#3C686E;">
        <a class="navbar-brand" href="#">
          <img src="your-logo.png" alt="logo" width="40" height="40">佑奕設計
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
      
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">首頁</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#about">產品說明</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#contact">聯絡我們</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/checkout.html">購物車</a>
            </li>
          </ul>
        </div>
      </nav>
  <div class="container py-5">
    <h2 class="mb-4">🛒 購物車結帳</h2>

    <!-- 購物車內容 -->
    <div id="cart-items" class="mb-4"></div>
    <div class="text-end mb-4">
      <h4>總金額：NT$ <span id="cart-total">0</span></h4>
    </div>

    <!-- 收件人表單 -->
    <h4 class="mb-3">📦 收件人資料</h4>
    <form id="checkout-form">
      <div class="mb-3">
        <label for="name" class="form-label">姓名</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="address" class="form-label">地址</label>
        <input type="text" class="form-control" id="address" required>
      </div>
      <button type="submit" class="btn btn-success">✅ 送出訂單</button>
    </form>
  </div>

  <script>
    // 初始化 EmailJS
    emailjs.init("YOUR_PUBLIC_KEY"); // <-- 替換成你的 Public Key

    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cart-items');
      const total = document.getElementById('cart-total');
      container.innerHTML = '';
      let sum = 0;

      if (cart.length === 0) {
        container.innerHTML = '<p class="text-muted">購物車是空的。</p>';
        total.textContent = '0';
        return;
      }

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.qty;
        sum += itemTotal;
        container.innerHTML += `
          <div class="card mb-2">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <h5>${item.name}</h5>
                <p class="mb-0">單價：NT$${item.price} ｜ 數量：${item.qty} ｜ 小計：NT$${itemTotal}</p>
              </div>
              <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">移除</button>
            </div>
          </div>
        `;
      });

      total.textContent = sum;
    }

    function removeItem(index) {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    document.getElementById('checkout-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const cart = JSON.parse(localStorage.getItem('cart')) || [];

      if (cart.length === 0) {
        alert('購物車是空的！');
        return;
      }

      const itemsList = cart.map(item => `${item.name} x${item.qty}（NT$${item.price}）`).join('\n');
      const totalAmount = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

      const templateParams = {
        name: name,
        email: email,
        address: address,
        total: totalAmount,
        items: itemsList
      };

      emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
        .then(function(response) {
          alert("✅ 訂單已成功送出！");
          localStorage.removeItem('cart');
          document.getElementById('checkout-form').reset();
          loadCart();
        }, function(error) {
          alert("❌ 發送失敗：" + JSON.stringify(error));
        });
    });

    loadCart();
  </script>
</body>
</html>
